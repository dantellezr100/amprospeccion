<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AM Autopartes | Cotizador</title>
  <style>

    .topbar{background:white;border-bottom:1px solid var(--line);padding:16px 22px;display:flex;gap:18px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:3;box-shadow:0 8px 24px rgba(15,23,42,.05)}
    .brand{display:flex;gap:14px;align-items:center}.logo{width:92px;height:62px;object-fit:contain;background:white;border-radius:18px;box-shadow:0 10px 28px rgba(15,23,42,.08);padding:8px}.brand h1{font-size:22px;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-weight:600}.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#e9f9ef;color:#087d35;font-weight:800;border:1px solid #bdf0ce}.back{background:#edf3ff;color:#164aa7;border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer}
    .wrap{max-width:1180px;margin:22px auto;padding:0 16px}.panel{background:white;border-radius:22px;padding:20px;box-shadow:0 16px 40px rgba(15,23,42,.08);border:1px solid #e7edf6;margin-bottom:18px}.grid2{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.field label{display:block;font-weight:900;margin:0 0 7px}.field input,.field select{width:100%;height:48px;border:1px solid #cbd7e8;border-radius:14px;padding:0 14px;font-size:16px;background:white}.searchRow{display:grid;grid-template-columns:1fr auto;gap:10px}.btn{border:0;border-radius:14px;padding:13px 17px;font-weight:900;cursor:pointer}.btnDark{background:var(--dark);color:white}.btnBlue{background:var(--azul);color:white}.btnSoft{background:#e9eff8;color:#10213d}.btnRed{background:#fee2e2;color:#991b1b}.btnGreen{background:#dcfce7;color:#166534}.tabs{display:flex;gap:8px;margin:18px 0 12px}.tab{border:0;border-radius:999px;padding:12px 18px;font-weight:900;background:#e8eef7;color:#10213d;cursor:pointer}.tab.active{background:#0f172a;color:white}.summary{color:#284463;font-weight:700;margin-top:10px}.catalogGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:white;border:1px solid #e1e8f3;border-radius:18px;padding:12px;display:grid;grid-template-columns:92px 1fr;gap:12px;box-shadow:0 10px 26px rgba(15,23,42,.06)}.thumb{width:92px;height:92px;object-fit:contain;border:1px solid #dce6f3;border-radius:14px;background:white}.sku{color:#d40000;font-weight:1000}.title{font-size:16px;line-height:1.1;font-weight:1000;margin-top:3px}.desc{color:#38516f;font-size:13px;line-height:1.25;margin-top:5px;max-height:34px;overflow:hidden}.meta{color:#4c6483;font-size:12px;margin-top:7px}.price{font-weight:1000;color:#0f3d8a;margin-top:7px}.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.mini{border:0;border-radius:10px;background:#e7edf6;padding:8px 10px;font-weight:900;cursor:pointer}.mini.blue{background:#2458b8;color:white}.mini.saved{background:#dcfce7;color:#166534}.quoteTable{width:100%;border-collapse:separate;border-spacing:0 8px}.quoteTable th{text-align:left;color:#475569;font-size:13px}.quoteTable td{background:white;border-top:1px solid #e3ebf6;border-bottom:1px solid #e3ebf6;padding:10px}.quoteTable td:first-child{border-left:1px solid #e3ebf6;border-radius:12px 0 0 12px}.quoteTable td:last-child{border-right:1px solid #e3ebf6;border-radius:0 12px 12px 0}.qty{width:72px;height:38px;border:1px solid #cbd7e8;border-radius:10px;padding:0 8px;font-weight:900}.totalBox{display:flex;justify-content:flex-end;gap:16px;align-items:center;font-size:20px;font-weight:1000;margin-top:14px}.empty{padding:28px;text-align:center;color:#64748b;font-weight:800;background:white;border-radius:18px;border:1px dashed #cbd7e8}.pager{display:flex;justify-content:center;gap:10px;align-items:center;margin-top:16px}.hidden{display:none}.managerNote{font-size:14px;color:#475569;line-height:1.45}.uploadBox{border:2px dashed #bfd0e8;border-radius:16px;padding:18px;background:#f8fbff}.status{margin-top:10px;font-weight:800;color:#164aa7}.clientInfo{background:#eef5ff;border:1px solid #cfe0ff;border-radius:16px;padding:12px;font-weight:800;color:#173d7c}
    @media(max-width:900px){.grid2{grid-template-columns:1fr}.catalogGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.topbar{align-items:flex-start;flex-direction:column}.brand h1{font-size:18px}.card{grid-template-columns:82px 1fr}.thumb{width:82px;height:82px}}
    @media(max-width:560px){.catalogGrid{grid-template-columns:1fr}.searchRow{grid-template-columns:1fr}.quoteTable{font-size:13px}.hideMob{display:none}.wrap{padding:0 10px}.panel{padding:14px}}
  
.quoteActions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-bottom:12px}
.formatPreview{background:#fff;border:1px solid #d7e2f1;border-radius:18px;padding:14px;margin-top:16px;overflow:auto}
.amFormat{min-width:1050px;border-collapse:collapse;font-size:12px;color:#000;background:#fff}
.amFormat td,.amFormat th{border:1px solid #000;padding:4px 6px;vertical-align:middle}
.amFormat .topTitle{font-weight:900;text-align:center;font-size:14px}
.amFormat .blue{background:#4677c2;color:#000;font-weight:900;text-align:center}
.amFormat .lightBlue{background:#c5d5ee;font-weight:900;text-align:center}
.amFormat .darkBlue{background:#2f3d50;color:#fff;font-weight:900;text-align:center}
.amFormat .gray{background:#d7dde6;font-weight:900;text-align:center}
.amFormat .cream{background:#fff2cc;font-weight:900}
.amFormat .green{background:#a6e673;font-weight:900;text-align:center}
.amFormat .right{text-align:right}
.amFormat .center{text-align:center}
.amFormat .red{color:#ff0000;font-weight:900}
.amFormat .logoCell{width:170px;text-align:center;font-weight:900;color:#d40000;background:#fff}

/* ===== v4.0.5 AJUSTE CELULAR COTIZADOR ===== */
html, body{max-width:100%;overflow-x:hidden}
img, table{max-width:100%}
@media(max-width:700px){
  body{font-size:15px}
  .topbar{position:relative;padding:12px 14px;gap:10px}
  .brand{gap:10px}.logo{width:72px;height:48px;border-radius:14px}.brand h1{font-size:17px}.brand p{font-size:12px}
  .wrap{width:100%;max-width:100%;margin:12px auto;padding:0 8px;overflow-x:hidden}
  .panel{width:100%;max-width:100%;padding:12px;border-radius:18px;overflow:hidden}
  .tabs{position:sticky;top:0;z-index:2;background:var(--bg);padding:8px 0;margin:8px 0 10px;overflow-x:auto}
  .tab{white-space:nowrap;padding:10px 15px}
  .quoteActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;justify-content:stretch;width:100%}
  .quoteActions select,.quoteActions input,.quoteActions button{width:100%!important;min-width:0!important;height:52px!important;font-size:15px!important;border-radius:16px!important;text-align:center}
  #observacionesDoc{grid-column:1 / -1;text-align:left!important}
  #finalizarDoc{grid-column:1 / -1;background:#dcfce7!important;color:#166534!important}
  .formatPreview{width:100%;max-width:100%;padding:5px;margin-top:12px;border-radius:16px;overflow:hidden;box-shadow:none}
  .amFormat{width:100%!important;min-width:0!important;max-width:100%!important;table-layout:fixed!important;font-size:4.6px!important;line-height:1.05!important}
  .amFormat td,.amFormat th{padding:1px 1.2px!important;line-height:1.05!important;word-break:break-word!important;white-space:normal!important}
  .amFormat .topTitle{font-size:5px!important}.amFormat .logoCell{width:14%!important}.amFormat .logoCell img{max-width:34px!important;max-height:24px!important}
  #tablaCotizacion{width:100%;max-width:100%;overflow:hidden;margin-top:12px}
  .quoteTable{display:block;width:100%;border-spacing:0;border-collapse:separate;font-size:15px}
  .quoteTable thead{display:none}
  .quoteTable tbody{display:block;width:100%}
  .quoteTable tr{display:grid;grid-template-columns:1fr auto;gap:8px;width:100%;background:#fff;border:1px solid #e3ebf6;border-radius:18px;padding:12px;margin:10px 0;box-shadow:0 8px 22px rgba(15,23,42,.06)}
  .quoteTable td{display:block;border:0!important;background:transparent!important;padding:2px!important;border-radius:0!important;min-width:0;word-break:break-word}
  .quoteTable td:nth-child(1){grid-column:1/2;font-size:13px;color:#d40000;font-weight:1000}
  .quoteTable td:nth-child(2){grid-column:1/2;font-size:15px;font-weight:900;line-height:1.15}
  .quoteTable td:nth-child(4),.quoteTable td:nth-child(5),.quoteTable td:nth-child(7){font-size:14px}
  .quoteTable td:nth-child(4)::before{content:'Público: ';font-weight:800;color:#64748b}
  .quoteTable td:nth-child(5)::before{content:'Cliente: ';font-weight:800;color:#64748b}
  .quoteTable td:nth-child(6){grid-column:2/3;grid-row:1/4;align-self:center;text-align:center}
  .quoteTable td:nth-child(7){grid-column:1/2;font-size:16px;color:#0f3d8a}
  .quoteTable td:nth-child(7)::before{content:'Total: ';font-weight:800;color:#64748b}
  .quoteTable td:nth-child(8){grid-column:2/3;grid-row:4/5;align-self:center}
  .qty{width:74px!important;height:50px!important;text-align:center;font-size:18px;border-radius:14px}
  .mini{height:46px;border-radius:14px;padding:0 14px;font-size:14px}
  .totalBox{position:sticky;bottom:8px;background:#fff;border:1px solid #e3ebf6;border-radius:18px;padding:14px;box-shadow:0 10px 28px rgba(15,23,42,.12);justify-content:space-between;gap:8px;font-size:20px;width:100%}
  .totalBox span:first-child{font-size:16px}
}
@media(max-width:390px){.amFormat{font-size:4.05px!important}.amFormat td,.amFormat th{padding:.8px 1px!important}.quoteActions{gap:8px}.btn{padding:12px 10px}.totalBox{font-size:18px}}

@media print{
  @page{size:A4 landscape;margin:4mm}
  html,body{background:#fff!important;width:297mm;height:210mm;margin:0!important;padding:0!important;overflow:hidden!important}
  body *{visibility:hidden!important}
  #formatoPreview,#formatoPreview *{visibility:visible!important}
  #formatoPreview{display:block!important;position:fixed!important;left:0!important;top:0!important;width:289mm!important;max-width:289mm!important;margin:0!important;padding:0!important;border:0!important;border-radius:0!important;box-shadow:none!important;overflow:visible!important;background:#fff!important}
  #tablaFormatoAM{width:289mm!important;min-width:0!important;max-width:289mm!important;table-layout:fixed!important;font-size:6.8px!important;line-height:1.05!important;page-break-inside:avoid!important;break-inside:avoid!important}
  #tablaFormatoAM td,#tablaFormatoAM th{padding:1.1px 1.6px!important;line-height:1.05!important;white-space:normal!important;word-break:break-word!important}
  #tablaFormatoAM .topTitle{font-size:8px!important}
  #tablaFormatoAM .logoCell{width:28mm!important}
  #tablaFormatoAM .logoCell img{max-width:24mm!important;max-height:16mm!important}
  .topbar,.tabs,.quoteActions,#tablaCotizacion,.panel:not(:has(#formatoPreview)){display:none!important}
}


/* ===== v4.0.7 MODAL PRODUCTO CELULAR ===== */
.card{cursor:pointer}
.card .actions{cursor:default}
.productModal{border:0;border-radius:22px;padding:0;width:min(760px,94vw);max-height:92vh;box-shadow:0 30px 90px rgba(15,23,42,.35);overflow:hidden}
.productModal::backdrop{background:rgba(15,23,42,.62);backdrop-filter:blur(2px)}
.modalHead{background:#0f172a;color:#fff;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;font-weight:1000}
.modalClose{border:0;background:transparent;color:#fff;font-size:30px;line-height:1;font-weight:900;cursor:pointer;padding:0 4px}
.modalBody{padding:18px;background:#fff;overflow:auto;max-height:calc(92vh - 64px)}
.detailHero{border:1px solid #dbe5f2;border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:center;min-height:330px;margin-bottom:18px}
.detailHero img{width:100%;max-height:330px;object-fit:contain;padding:12px}
.detailGrid{display:grid;grid-template-columns:130px 1fr;gap:10px 14px;font-size:16px;line-height:1.25}
.detailGrid b{color:#24344d}
.detailSku{color:#d40000;font-weight:1000}
@media(max-width:700px){
  .productModal{width:96vw;max-height:88vh;border-radius:18px}
  .modalHead{padding:15px 16px;font-size:15px}
  .modalBody{padding:14px;max-height:calc(88vh - 58px)}
  .detailHero{min-height:230px;border-radius:16px}
  .detailHero img{max-height:245px}
  .detailGrid{grid-template-columns:105px 1fr;font-size:15px;gap:9px 10px}
}

</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="icons/logo-original.png" onerror="this.style.display='none'" alt="AM Autopartes">
      <div><h1>Cotizador AM Autopartes</h1><p>Buscador, catálogo y cotización para vendedores</p></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span class="badge" id="badgeActualizado">Lista local</span>
      <button class="back" onclick="location.href='index.html'">← Regresar</button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel grid2">
      <div>
        <div class="field"><label>Cliente</label><input id="clienteSelect" list="clientesLista" type="search" placeholder="Escribe o selecciona cliente..." autocomplete="off"><datalist id="clientesLista"></datalist><select id="clienteDropdown" style="margin-top:10px"><option value="">Ver todos los clientes</option></select></div>
      </div>
      <div class="clientInfo" id="clienteInfo">Selecciona un cliente para aplicar lista, descuento extra e IVA.</div>
    </section>

    <section class="panel">
      <div class="field">
        <label>Buscar por SKU, pieza, marca, modelo, año o descripción</label>
        <div class="searchRow"><input id="buscador" type="search" placeholder="Ejemplo: Ibiza, faro, ST-03158..." autocomplete="off"><button class="btn btnDark" id="limpiarBusqueda">Limpiar</button></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
        <select id="filtroMarca" style="height:42px;border-radius:12px;border:1px solid #cbd7e8;padding:0 12px"><option value="">Todas las marcas</option></select>
        <select id="porPagina" style="height:42px;border-radius:12px;border:1px solid #cbd7e8;padding:0 12px"><option value="20">20 por página</option><option value="50" selected>50 por página</option><option value="100">100 por página</option></select>
      </div>
      <div class="summary" id="resumenBusqueda"></div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="catalogo">Catálogo</button>
      <button class="tab" data-tab="cotizacion">Cotización</button>
      </nav>

    <section id="catalogo" class="tabPanel"><div class="catalogGrid" id="gridProductos"></div><div class="pager" id="paginacion"></div></section>
    <section id="cotizacion" class="tabPanel hidden">
      <div class="panel">
        <div class="quoteActions">
          <select id="tipoDocumento" style="height:44px;border-radius:12px;border:1px solid #cbd7e8;padding:0 12px;font-weight:900">
            <option value="COTIZACIÓN">Cotización</option>
            <option value="PEDIDO">Pedido</option>
          </select>
          <input id="observacionesDoc" placeholder="Observaciones para formato" style="height:44px;border-radius:12px;border:1px solid #cbd7e8;padding:0 12px;min-width:260px">
          <button class="btn btnGreen" id="finalizarDoc">Finalizar formato</button>
          <button class="btn btnSoft" id="descargarExcelAM">Descargar Excel AM</button>
          <button class="btn btnSoft" id="imprimirFormatoAM">PDF / Imprimir</button>
          <button class="btn btnSoft" id="copiarCotizacion">Copiar cotización</button>
          <button class="btn btnRed" id="vaciarCotizacion">Vaciar cotización</button>
        </div>
        <div class="formatPreview hidden" id="formatoPreview"></div>
        <div id="tablaCotizacion"></div>
      </div>
    </section>
  </main>



  <dialog id="detalleProductoModal" class="productModal">
    <div class="modalHead">
      <strong id="detalleProductoTitulo">Detalle producto</strong>
      <button type="button" class="modalClose" id="cerrarDetalleProducto">×</button>
    </div>
    <div id="detalleProductoContenido" class="modalBody"></div>
  </dialog>

  <script src="catalogo.js"></script>
  <script src="clientes_cotizador.js"></script>
  <script src="precios_existencias_cotizador.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC15sDO35rdMeoTHA-jyPA1IIV_9G-wya8",
    authDomain: "am-autopartes.firebaseapp.com",
    projectId: "am-autopartes",
    storageBucket: "am-autopartes.firebasestorage.app",
    messagingSenderId: "4404873517",
    appId: "1:4404873517:web:31d2d19156da63c82baba4",
    measurementId: "G-B0RHTQW82R"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const allowed = new Set(['clientes','precios','existencias']);

  async function upload(tipo, datos){
    if(!allowed.has(tipo)) throw new Error('Tipo de carga no válido: '+tipo);
    await setDoc(doc(db, 'cotizador_am', tipo), {
      tipo,
      datos,
      total: Array.isArray(datos) ? datos.length : Object.keys(datos || {}).length,
      actualizado: serverTimestamp(),
      actualizadoLocal: new Date().toISOString()
    }, { merge: true });
    return true;
  }


  async function load(tipo){
    const snap = await getDoc(doc(db, 'cotizador_am', tipo));
    return snap.exists() ? snap.data() : null;
  }

  async function loadAll(){
    const [clientes, precios, existencias] = await Promise.all([
      load('clientes'), load('precios'), load('existencias')
    ]);
    return { clientes, precios, existencias };
  }

  window.AMCloudCotizador = { upload, load, loadAll };
  window.dispatchEvent(new CustomEvent('amcloudcotizadorready'));
</script>

  <script src="cotizador_app.js"></script>
</body>
</html>
